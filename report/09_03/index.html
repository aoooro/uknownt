<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unknown T — Weekly Report w/c 2026-03-09</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #000000;
    --surface: #131313;
    --surface-elevated: #1a1a1a;
    --border: #1e1e1e;
    --border-light: #2a2a2a;
    --accent: #C9952A;
    --accent-dim: rgba(201, 149, 42, 0.15);
    --positive: #C9952A;
    --negative: #ff4444;
    --text-primary: #ffffff;
    --text-secondary: #999999;
    --text-tertiary: #666666;
    --font-display: 'Bebas Neue', Impact, sans-serif;
    --font-data: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --nav-height: 56px;
    --page-pad: 64px;
}

html {
    font-size: 15px;
    scroll-behavior: smooth;
    scroll-padding-top: var(--nav-height);
}

body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* ── Sticky Nav ───────────────────────────────────────────────── */

.report-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--nav-height);
    padding: 0 var(--page-pad);
    background: transparent;
    border-bottom: 1px solid var(--border);
}

.nav-brand {
    font-family: var(--font-data);
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    transition: color 0.2s;
}

.nav-brand:hover {
    color: var(--text-primary);
}

.nav-logo {
    height: 24px;
    width: auto;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav-link {
    font-family: var(--font-data);
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.2s;
    white-space: nowrap;
}

.nav-link:hover {
    color: var(--text-primary);
}

.nav-link.active {
    color: var(--accent);
}

/* ── Hero Section (full-viewport slide) ───────────────────────── */

.report-hero {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    overflow: hidden;
    background: var(--bg);
}

/* Full-width background image */
.report-hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
}

/* Frosted glass overlay — right half, sharp edge */
.report-hero-frost {
    position: absolute;
    inset: 0;
    left: 50%;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(32px) brightness(1.05) saturate(0.5);
    -webkit-backdrop-filter: blur(32px) brightness(1.05) saturate(0.5);
    /* no mask — hard cut edge */
}

/* Subtle bottom gradient for text legibility */
.report-hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.075) 50%,
        rgba(0,0,0,0.35) 80%,
        rgba(0,0,0,0.475) 100%
    );
    z-index: 1;
}

.report-hero-content {
    position: relative;
    z-index: 2;
    padding: calc(var(--nav-height) + 32px) var(--page-pad) 64px;
    max-width: 50%;
}

/* Overview highlights — right side of hero */
.hero-highlights {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 50%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: var(--nav-height) var(--page-pad) 64px calc(var(--page-pad) / 2);
    gap: 24px;
}

.hero-highlight-card {
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    padding-bottom: 20px;
}

.hero-highlight-value {
    font-family: var(--font-display);
    font-size: 2.6rem;
    line-height: 1;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 6px;
}

.hero-highlight-delta {
    font-family: var(--font-data);
    font-size: 1rem;
    font-weight: 600;
    margin-left: 12px;
    vertical-align: middle;
}

.hero-highlight-delta.positive { color: var(--positive); }
.hero-highlight-delta.negative { color: var(--negative); }

.hero-highlight-label {
    font-family: var(--font-data);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.75);
    text-transform: uppercase;
    letter-spacing: 0.08em;
}

.hero-highlight-custom {
    font-family: var(--font-body);
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--text-primary);
    padding-bottom: 16px;
}
.hero-highlight-custom-header {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
.hero-highlight-custom-sep {
    font-weight: 700;
}
.hero-highlight-custom-text {
    font-weight: 400;
    color: rgba(255,255,255,0.75);
}

.report-artist-name {
    font-family: var(--font-display);
    font-size: 7rem;
    line-height: 0.88;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    text-transform: uppercase;
    margin-bottom: 16px;
}

.report-campaign {
    font-family: var(--font-data);
    font-size: 1.6rem;
    color: var(--text-primary);
    font-weight: 700;
    margin-bottom: 8px;
}

.report-week {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}

/* ── Section container ────────────────────────────────────────── */

.report-section {
    min-height: 100vh;
    padding: 64px var(--page-pad);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}

.report-section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 48px;
}

.report-section-number {
    font-family: var(--font-display);
    font-size: 4rem;
    color: var(--accent);
    line-height: 1;
}

.report-section-divider {
    font-family: var(--font-data);
    font-size: 0.9rem;
    color: var(--text-tertiary);
}

.report-section-title {
    font-family: var(--font-data);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    font-weight: 500;
}

.report-section-content {
    flex: 1;
}

.section-empty {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

/* Divider between sub-sections within a section */
.subsection-divider {
    height: 1px;
    background: var(--border);
    margin: 40px 0;
}

/* ── 01 Numbers ───────────────────────────────────────────────── */

#numbers {
    background: #DBDCD6;
    color: #000000;
    border-top-color: #c5c6c1;
}

#numbers .report-section-number {
    color: var(--accent);
}

#numbers .report-section-divider,
#numbers .report-section-title {
    color: #666666;
}

#numbers {
    min-height: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
}

#numbers .report-section-header {
    grid-column: 1;
    grid-row: 1;
    margin-bottom: 0;
    align-self: start;
}

#numbers .report-section-content {
    grid-column: 1 / -1;
    grid-row: 1;
}

.numbers-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
}

/* ── Platform breakdown — centred in right half ── */

.numbers-breakdown {
    grid-column: 2;
    grid-row: 1;
    align-self: start;
    justify-self: center;
    width: 100%;
    max-width: 440px;
    padding: 0 32px;
}

.numbers-breakdown-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 12px;
    margin: 0 -12px;
    border-bottom: 1px solid #c5c6c1;
    transition: background 0.2s;
    border-radius: 2px;
}

.numbers-breakdown-row:hover {
    background: rgba(0,0,0,0.04);
}

.numbers-breakdown-row:first-child {
    border-top: 1px solid #c5c6c1;
}

.numbers-breakdown-icon {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    color: #000000;
    opacity: 0.5;
    display: flex;
    align-items: center;
}

.numbers-breakdown-label {
    font-family: var(--font-data);
    font-size: 1.05rem;
    font-weight: 400;
    color: #666666;
    letter-spacing: 0.01em;
}

.numbers-breakdown-value {
    font-family: var(--font-data);
    font-size: 1.1rem;
    font-weight: 700;
    color: #000000;
    margin-left: auto;
}

/* ── Big hero numbers — pinned to baseline ── */

.numbers-hero {
    grid-column: 1;
    grid-row: 1;
    align-self: end;
    display: flex;
    gap: 80px;
}

.numbers-hero-label {
    font-family: var(--font-data);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999999;
    font-weight: 500;
    margin-bottom: 8px;
}

.numbers-hero-value {
    font-family: var(--font-display);
    font-size: 5.5rem;
    font-weight: 400;
    color: #000000;
    line-height: 1;
    letter-spacing: 0.02em;
}

.numbers-hero .delta {
    font-size: 1.1rem;
    font-weight: 500;
    margin-left: 8px;
    vertical-align: super;
}

/* ── 02 Streaming — Metric cards ──────────────────────────────── */

.metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
}

.metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
}

.metric-card-platform {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
}

.metric-card-value {
    font-family: var(--font-data);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
}

.metric-card-label {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 4px;
}

.delta { font-family: var(--font-data); }
.delta.positive { color: var(--positive); }
.delta.negative { color: var(--negative); }

/* ── Bar chart ────────────────────────────────────────────────── */

.bar-chart-container { margin-bottom: 40px; }

.bar-chart-title {
    font-family: var(--font-data);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 16px;
    font-weight: 500;
}

.bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 160px;
    padding-bottom: 28px;
    position: relative;
    border-bottom: 1px solid var(--border);
}

.bar {
    flex: 1;
    min-width: 0;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: opacity 0.2s;
    cursor: default;
}

.bar:hover { opacity: 0.8; }

.bar-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%) rotate(-45deg);
    font-family: var(--font-data);
    font-size: 0.5rem;
    color: var(--text-tertiary);
    white-space: nowrap;
    transform-origin: top center;
}

.bar-tooltip {
    display: none;
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: var(--bg);
    font-family: var(--font-data);
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    z-index: 10;
}

.bar:hover .bar-tooltip { display: block; }

/* ── Top tracks table ─────────────────────────────────────────── */

.tracks-table {
    width: 100%;
    border-collapse: collapse;
}

.tracks-table th {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
}

.tracks-table th:last-child { text-align: right; }

.tracks-table td {
    font-family: var(--font-data);
    font-size: 0.85rem;
    padding: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
}

.tracks-table td:first-child {
    font-weight: 700;
    color: var(--text-tertiary);
    width: 40px;
}

.tracks-table td:last-child {
    text-align: right;
    color: var(--text-secondary);
}

.track-bar-cell { position: relative; }

.track-bar-bg {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: var(--accent-dim);
    border-radius: 2px;
    width: 100%;
}

.track-bar-fill {
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
}

.track-streams {
    position: relative;
    z-index: 1;
}

/* ── 03 Press — cards grid ────────────────────────────────────── */

.press-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
}

.press-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
}

.press-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    cursor: pointer;
}

.press-card:hover { border-color: var(--border-light); }
.press-card-link:hover { border-color: var(--accent); }

.press-card-screenshot {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--surface-elevated);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    overflow: hidden;
}

.press-card-screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

.press-card-screenshot-placeholder {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 40%;
}

.press-card-body { padding: 16px; }

.press-card-outlet {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
}

.press-card-headline {
    font-family: var(--font-body);
    font-size: 0.9rem;
    color: var(--text-primary);
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
}

.press-card-date {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
}

/* ── Press text list (non-featured) ──────────────────────────── */

.press-list {
    margin-top: 24px;
    border-top: 1px solid var(--border);
}

.press-list-row {
    display: grid;
    grid-template-columns: 140px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
}

.press-list-row-link {
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.15s;
}

.press-list-row-link:hover {
    background: var(--surface);
}

.press-list-outlet {
    font-family: var(--font-data);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-weight: 600;
}

.press-list-headline {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--text-primary);
    font-weight: 400;
    line-height: 1.4;
}

.press-list-date {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
    white-space: nowrap;
}

/* ── Quotes grid ──────────────────────────────────────────────── */

.quotes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
}

.quote-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 24px 20px;
    position: relative;
}

.quote-mark {
    font-family: var(--font-display);
    font-size: 5rem;
    color: var(--accent);
    line-height: 0.5;
    position: absolute;
    top: 20px; left: 20px;
    opacity: 0.3;
}

.quote-text {
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--text-primary);
    line-height: 1.6;
    font-style: italic;
    position: relative;
    z-index: 1;
    margin-bottom: 12px;
    padding-left: 20px;
}

.quote-source {
    font-family: var(--font-data);
    font-size: 0.72rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding-left: 20px;
}

/* ── Playlist grid ────────────────────────────────────────────── */

/* ── Playlist DSP grid (Streaming section) ───────────────────── */

.playlist-dsp-grid {
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.playlist-dsp-row {
    display: grid;
    gap: 24px;
}

.playlist-dsp-col {
    min-width: 0;
}

.playlist-dsp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-data);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
}

.playlist-dsp-logo {
    width: 20px;
    height: 20px;
    object-fit: contain;
}

.playlist-dsp-item,
.playlist-dsp-item-link {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 42px;
    padding: 0 0 0 2px;
    border-bottom: 1px solid var(--border);
    box-sizing: border-box;
}

.playlist-dsp-item-link {
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    cursor: pointer;
}

.playlist-dsp-item-link:hover {
    background: var(--surface);
}

.playlist-dsp-name {
    margin-left: 2px;
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--text-primary);
    font-weight: 500;
    line-height: 1.4;
}

.playlist-dsp-followers {
    font-family: var(--font-data);
    font-size: 0.68rem;
    color: var(--text-tertiary);
    white-space: nowrap;
}

/* ── 04 Socials — stat cards ──────────────────────────────────── */

.social-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
}

.social-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
}

.social-card-platform {
    font-family: var(--font-data);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 16px;
}

.social-stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
}

.social-stat-row:last-child { border-bottom: none; }

.social-stat-label {
    font-family: var(--font-data);
    font-size: 0.72rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.social-stat-value {
    font-family: var(--font-data);
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-primary);
}

/* ── Socials — mirrors Numbers layout ─────────────────────────── */

.socials-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
}

/* ── Image cards — left column ── */

.socials-img-area {
    grid-column: 1;
    grid-row: 1;
    align-self: end;
    padding-right: 40px;
    padding-top: 80px;
}

.socials-img-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.socials-img-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.socials-img-thumb {

.socials-img-metrics {

.socials-img-metric {

}

.socials-img-metric svg {

}

/* ── Breakdown rows — right column ── */

.socials-breakdown {
    grid-column: 2;
    grid-row: 1;
    align-self: start;
    justify-self: center;
    width: 100%;
    max-width: 440px;
    padding: 80px 32px 0;
}

.socials-breakdown-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 12px;
    margin: 0 -12px;
    border-bottom: 1px solid #c5c6c1;
    transition: background 0.2s;
    border-radius: 2px;
}

.socials-breakdown-row:hover {
    background: rgba(0,0,0,0.04);
}

.socials-breakdown-row:first-child {
    border-top: 1px solid #c5c6c1;
}

.socials-breakdown-icon {
    flex-shrink: 0;
    width: 16px;

.socials-breakdown-icon svg {

}

.socials-breakdown-label {
    font-family: var(--font-data);
    font-size: 1.05rem;
    font-weight: 400;
    color: #666666;
    letter-spacing: 0.01em;
}

.socials-breakdown-growth {
    font-family: var(--font-data);
    font-size: 0.8rem;
    font-weight: 600;
    color: #999999;
    margin-left: auto;
}

.socials-breakdown-value {
    font-family: var(--font-data);
    font-size: 1.1rem;
    font-weight: 700;
    color: #000000;
    margin-left: auto;
}

.socials-breakdown-growth + .socials-breakdown-value {
    margin-left: 0;
}

/* ── Hero numbers — bottom-left, side by side ── */

.socials-hero {
    grid-column: 2;
    grid-row: 1;
    align-self: end;
    display: flex;
    gap: 80px;
    padding: 0 32px;
    justify-self: center;
    width: 100%;
    max-width: 440px;
}

.socials-hero-label {
    font-family: var(--font-data);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #999999;
    font-weight: 500;
    margin-bottom: 8px;
}

.socials-hero-value {
    font-family: var(--font-display);
    font-size: 5.5rem;
    font-weight: 400;
    color: #000000;
    line-height: 1;
    letter-spacing: 0.02em;
}

#socials {
    background: #DBDCD6;
    color: #000000;
    min-height: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-top-color: #c5c6c1;
}

#socials .report-section-header {
    grid-column: 1;
    grid-row: 1;
    margin-bottom: 0;
    align-self: start;
}

#socials .report-section-content {
    grid-column: 1 / -1;
    grid-row: 1;
}

#socials .report-section-number { color: var(--accent); }
#socials .report-section-divider,
#socials .report-section-title { color: #666666; }

/* ── Social Channel grid ──────────────────────────────────────── */

.social-channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
}

.social-channel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
}

.social-channel-card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    cursor: pointer;
}

.social-channel-card:hover { border-color: var(--border-light); }
.social-channel-card-link:hover { border-color: var(--accent); }

.social-channel-card-screenshot {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: var(--surface-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.social-channel-card-screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

.social-channel-card-body { padding: 10px 12px; }

.social-channel-card-platform {
    font-family: var(--font-data);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
}

.social-channel-card-account {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 3px;
}

.social-channel-card-desc {
    font-family: var(--font-body);
    font-size: 0.7rem;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 4px;
}

.social-channel-card-date {
    font-family: var(--font-data);
    font-size: 0.65rem;
    color: var(--text-tertiary);
}

/* Social channel list (non-featured) */

.social-channel-list {
    margin-top: 24px;
    border-top: 1px solid var(--border);
}

.social-channel-list-row {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 42px;
    padding: 0 2px;
    border-bottom: 1px solid var(--border);
}

.social-channel-list-row-link {
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: background 0.15s;
}

.social-channel-list-row-link:hover {
    background: var(--surface);
}

.social-channel-list-platform {
    font-family: var(--font-data);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
}

.social-channel-list-platform::after {
    content: ':';
}

.social-channel-list-name {
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--text-primary);
    font-weight: 500;
}

/* ── Creator grid ─────────────────────────────────────────────── */

.creator-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
}

.creator-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
}

.creator-card:hover { border-color: var(--border-light); }

.creator-card-screenshot {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: var(--surface-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.creator-card-screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

.creator-card-body { padding: 16px; }

.creator-card-platform {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
}

.creator-card-name {
    font-family: var(--font-data);
    font-size: 0.9rem;
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 4px;
}

.creator-card-desc {
    font-family: var(--font-body);
    font-size: 0.8rem;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 6px;
}

.creator-card-date {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
}

.radio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
}

.radio-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
}

.radio-card-station {

    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.radio-card-show {
    font-family: var(--font-data);
    font-size: 0.8rem;
    color: var(--accent);
    margin-bottom: 4px;
}

.radio-card-date {
    font-family: var(--font-data);
    font-size: 0.7rem;
    color: var(--text-tertiary);
}

/* ── Footer ───────────────────────────────────────────────────── */

.report-footer {
    padding: 40px var(--page-pad);
    border-top: 1px solid var(--border);
    text-align: center;
}

.report-footer-text {
    font-family: var(--font-data);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-tertiary);
}

        grid-row: 1;

    .numbers-hero {
        grid-column: 1;
        grid-row: 2;
        align-self: start;
        flex-wrap: wrap;
        gap: 32px;
        margin-top: 24px;
    }
    .numbers-hero-value { font-size: 3.5rem; }

    .report-section { padding: 48px 24px; }
    .report-section-number { font-size: 2.8rem; }
    .report-footer { padding: 32px 24px; }
}

@media (max-width: 480px) {

        flex-direction: column;

@media print {

<script>
/**
 * Weekly Report — Report renderer.
 *
 * Renders a polished, dark magazine-style report from JSON data.
 * Used in both the standalone report page and HTML export.
 *
 * Structure:
 *   Nav  — sticky top bar with anchor links
 *   Hero — artist name, campaign, week
 *   01 Numbers      — headline stats
 *   02 Streaming    — DSP metrics, daily chart, top tracks
 *   03 Press & Pages — press articles, quotes, playlists
 *   04 Socials      — social stats, channel posts, creators
 *   05 Radio        — radio plays
 */

(function () {
    'use strict';

    const $root = document.getElementById('report-root');
    if (!$root) return;

    const ALL_SECTIONS = [
        { id: 'numbers',      label: 'Numbers' },
        { id: 'streaming',    label: 'Streaming' },
        { id: 'press',        label: 'Press' },
        { id: 'social_pages', label: 'Socials Pages' },
        { id: 'socials',      label: 'Socials' },
        { id: 'radio',        label: 'Radio' },
        { id: 'club',         label: 'Club' },
        { id: 'quotes',       label: 'Quotes' },
    ];

    // ── Init ──────────────────────────────────────────────────────────

    async function init() {
        let data;

        if (window.__REPORT_DATA__) {
            data = window.__REPORT_DATA__;
        } else {
            const parts = window.location.pathname.split('/');
            const reportId = parts[parts.length - 1];
            if (!reportId) {
                $root.innerHTML = '<p style="color:#999;text-align:center;padding:48px;">No report ID found</p>';
                return;
            }

            try {
                const res = await fetch(`/weekly-report/api/reports/${reportId}`);
                if (!res.ok) throw new Error('Report not found');
                data = await res.json();
            } catch (e) {
                $root.innerHTML = `<p style="color:#999;text-align:center;padding:48px;">Failed to load report: ${e.message}</p>`;
                return;
            }
        }

        renderReport(data);
    }

    // ── Main render ───────────────────────────────────────────────────

    function renderReport(data) {
        const reportId = data._meta?.report_id || '';
        const vis = data.visible_sections || ALL_SECTIONS.map(s => s.id);
        const SECTIONS = vis.map(id => ALL_SECTIONS.find(s => s.id === id)).filter(Boolean);

        const renderers = {
            numbers:      (n) => renderNumbers(data, n),
            streaming:    (n) => renderStreaming(data, n, reportId),
            press:        (n) => renderPress(data, n, reportId),
            social_pages: (n) => renderSocialPages(data, n, reportId),
            socials:      (n) => renderSocials(data, n, reportId),
            radio:        (n) => renderRadio(data, n),
            club:         (n) => renderClub(data, n),
            quotes:       (n) => renderQuotes(data, n),
        };

        let html = '';
        html += renderNav(data, SECTIONS);
        html += renderHero(data, reportId);

        SECTIONS.forEach((s, i) => {
            const fn = renderers[s.id];
            if (fn) html += fn(i + 1);
        });

        html += renderFooter(data);

        $root.innerHTML = html;

        // Smooth scrolling for nav links
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(link.getAttribute('href'));
                if (target) {
                    const navHeight = document.querySelector('.report-nav')?.offsetHeight || 0;
                    const top = target.getBoundingClientRect().top + window.scrollY - navHeight;
                    window.scrollTo({ top, behavior: 'smooth' });
                }
            });
        });

        // Highlight active nav on scroll
        const sections = SECTIONS.map(s => document.getElementById(s.id)).filter(Boolean);
        const links = document.querySelectorAll('.nav-link');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    links.forEach(l => l.classList.remove('active'));
                    const active = document.querySelector(`.nav-link[href="#${entry.target.id}"]`);
                    if (active) active.classList.add('active');
                }
            });
        }, { rootMargin: '-20% 0px -60% 0px' });

        sections.forEach(s => observer.observe(s));
    }

    // ── Calculated totals ─────────────────────────────────────────────

    function calcTotalStreams(data) {
        const keys = ['spotify_streams', 'apple_streams', 'deezer_streams', 'amazon_streams'];
        const vals = keys.map(k => data[k]).filter(v => v != null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : data.total_streams ?? null;
    }

    function calcSocialReach(data) {
        const keys = ['instagram_followers', 'youtube_subscribers', 'tiktok_followers'];
        const vals = keys.map(k => data[k]).filter(v => v != null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : data.social_reach ?? null;
    }

    // ── Hero ───────────────────────────────────────────────────────────

    function renderHero(data, reportId) {
        const heroImg = data.hero_image
            ? `background-image: url('/weekly-report/api/reports/${reportId}/images/${data.hero_image}')`
            : '';

        // Build overview highlight cards from the overview_highlights array
        const highlights = data.overview_highlights || [];
        const allStats = {
            total_streams:      { label: 'Total Streams',      value: calcTotalStreams(data),   delta: data.total_streams_delta_pct },
            youtube_streams:    { label: 'Total Video Views',   value: data.youtube_streams,    delta: null },
            monthly_listeners:  { label: 'Monthly Listeners',  value: data.monthly_listeners,  delta: data.monthly_listeners_delta_pct },
            social_reach:       { label: 'Current Social Reach',       value: calcSocialReach(data),   delta: null },
            press_hits:         { label: 'Press Hits',         value: data.press_hits,         delta: null },
            shazam_shazams:     { label: 'Shazam',             value: data.shazam_shazams,     delta: null },
        };

        // Custom text lines lookup
        const customLines = {};
        (data.overview_custom || []).forEach(c => { customLines[c.id] = c; });

        let highlightHTML = '';
        if (highlights.length) {
            const cards = highlights.map(key => {
                // Custom text line?
                const custom = customLines[key];
                if (custom) {
                    return `<div class="hero-highlight-card hero-highlight-custom">
                        <span class="hero-highlight-custom-header">${esc(custom.header)}</span><span class="hero-highlight-custom-sep">:</span> <span class="hero-highlight-custom-text">${esc(custom.text)}</span>
                    </div>`;
                }
                // Stat card
                const s = allStats[key];
                if (!s || !s.value) return '';
                const deltaStr = s.delta != null
                    ? `<span class="hero-highlight-delta ${s.delta >= 0 ? 'positive' : 'negative'}">${s.delta >= 0 ? '+' : ''}${s.delta}%</span>`
                    : '';
                return `<div class="hero-highlight-card">
                    <div class="hero-highlight-value">${fmtNum(s.value)}${deltaStr}</div>
                    <div class="hero-highlight-label">${s.label}</div>
                </div>`;
            }).filter(Boolean).join('');
            if (cards) highlightHTML = `<div class="hero-highlights">${cards}</div>`;
        }

        return `
            <section class="report-hero">
                <div class="report-hero-bg" style="${heroImg}"></div>
                <div class="report-hero-frost"></div>
                <div class="report-hero-gradient"></div>
                <div class="report-hero-content">
                    <h1 class="report-artist-name">${esc(data.artist_name)}</h1>
                    ${data.campaign_name ? `<p class="report-campaign">${esc(data.campaign_name)}</p>` : ''}
                    <p class="report-week">w/c ${fmtDateLong(data.week_commencing)}</p>
                </div>
                ${highlightHTML}
            </section>
        `;
    }

    function renderNumbers(data, num) {
        const visible = data.numbers_visible || [];

        // Platform breakdown lookup — rendered in numbers_visible order
        const allBreakdown = {
            spotify_streams:           { label: 'Spotify Streams',          value: data.spotify_streams },
            spotify_monthly_listeners: { label: 'Spotify Monthly Listeners', value: data.spotify_monthly_listeners },
            apple_streams:             { label: 'Apple Streams',            value: data.apple_streams },
            deezer_streams:            { label: 'Deezer Streams',           value: data.deezer_streams },
            amazon_streams:            { label: 'Amazon Streams',           value: data.amazon_streams },
            youtube_streams:           { label: 'YouTube Views',            value: data.youtube_streams },
            instagram_followers:       { label: 'Instagram Followers',      value: data.instagram_followers },
            youtube_subscribers:       { label: 'YouTube Subscribers',      value: data.youtube_subscribers },
            tiktok_followers:          { label: 'TikTok Followers',         value: data.tiktok_followers },
            shazam_shazams:            { label: 'Shazam',                   value: data.shazam_shazams },
        };
        const breakdownLines = visible
            .map(key => { const info = allBreakdown[key]; return info && info.value ? { key, label: info.label, value: info.value } : null; })
            .filter(Boolean);

        const breakdownHTML = breakdownLines.map(l => `
            <div class="numbers-breakdown-row">
                <span class="numbers-breakdown-icon">${PLATFORM_ICONS[l.key] || ''}</span>
                <span class="numbers-breakdown-label">${l.label}</span>
                <span class="numbers-breakdown-value">${fmtNum(l.value)}</span>
            </div>
        `).join('');

        // Hero numbers (bottom)
        const heroNumbers = [];
        const totalStreams = calcTotalStreams(data);
        if (totalStreams) {
            heroNumbers.push({ label: 'Total Streams', value: totalStreams, delta: data.total_streams_delta_pct });
        }
        const socialReach = calcSocialReach(data);
        if (socialReach) {
            heroNumbers.push({ label: 'Current Social Reach', value: socialReach });
        }

        const heroHTML = heroNumbers.map(h => `
            <div class="numbers-hero-stat">
                <div class="numbers-hero-label">${h.label}</div>
                <div class="numbers-hero-value">${fmtNum(h.value)}${h.delta != null ? ' ' + fmtDelta(h.delta) : ''}</div>
            </div>
        `).join('');

        const content = `
            <div class="numbers-layout">
                ${breakdownHTML ? `<div class="numbers-breakdown">${breakdownHTML}</div>` : ''}
                ${heroHTML ? `<div class="numbers-hero">${heroHTML}</div>` : ''}
            </div>
        `;

        return sectionWrap(num, 'Numbers', content, 'numbers');
    }

    function renderStreaming(data, num, reportId) {
        let content = '';

        // DSP metric cards
        if (data.streaming?.length) {
            content += '<div class="metric-grid">';
            for (const s of data.streaming) {
                content += `
                    <div class="metric-card">
                        <div class="metric-card-platform">${platformLabel(s.platform)}</div>
                        <div class="metric-card-value">${fmtNum(s.weekly_streams)}</div>
                        <div class="metric-card-label">Weekly Streams ${s.weekly_streams_delta_pct != null ? fmtDelta(s.weekly_streams_delta_pct) : ''}</div>
                    </div>
                `;
            }
            content += '</div>';
        }

        // Playlist support — grouped by DSP in a 3-column grid
        if (data.playlists?.length) {
            if (content) content += '<div class="subsection-divider"></div>';

            // Group playlists by DSP
            const byDsp = {};
            for (const p of data.playlists) {
                const dsp = p.dsp || 'other';
                if (!byDsp[dsp]) byDsp[dsp] = [];
                byDsp[dsp].push(p);
            }

            // Build DSP columns — only show DSPs that have playlists
            content += '<div class="playlist-dsp-grid">';
            for (const row of DSP_GRID) {
                const activeCols = row.filter(dsp => byDsp[dsp]?.length);
                if (!activeCols.length) continue;

                content += `<div class="playlist-dsp-row" style="grid-template-columns: repeat(3, 1fr);">`;
                for (const dsp of activeCols) {
                    content += `<div class="playlist-dsp-col">`;
                    content += `<div class="playlist-dsp-header">
                        ${DSP_LOGO[dsp] ? `<img class="playlist-dsp-logo" src="${DSP_LOGO[dsp]}" alt="">` : ''}
                        <span>${platformLabel(dsp)}</span>
                    </div>`;
                    content += `<div class="playlist-dsp-list">`;
                    for (const p of byDsp[dsp]) {
                        const link = p.url
                            ? `<a href="${esc(p.url)}" target="_blank" rel="noopener" class="playlist-dsp-item-link">`
                            : '<div class="playlist-dsp-item">';
                        const closeTag = p.url ? '</a>' : '</div>';
                        content += `${link}
                            <div class="playlist-dsp-name">${esc(p.playlist_name)}</div>
                            ${p.followers ? `<div class="playlist-dsp-followers">${fmtNum(p.followers)} followers</div>` : ''}
                        ${closeTag}`;
                    }
                    content += '</div></div>';
                }
                content += '</div>';
            }
            content += '</div>';
        }

        // Daily streams bar chart
        if (data.daily_streams?.length) {
            if (content) content += '<div class="subsection-divider"></div>';
            const max = Math.max(...data.daily_streams.map(d => d.streams));
            content += `
                <div class="bar-chart-container">
                    <div class="bar-chart-title">Daily Streams — Last ${data.daily_streams.length} Days</div>
                    <div class="bar-chart">
                        ${data.daily_streams.map(d => {
                            const pct = max > 0 ? (d.streams / max * 100) : 0;
                            const dateLabel = d.date.slice(5);
                            return `
                                <div class="bar" style="height: ${pct}%;">
                                    <div class="bar-tooltip">${fmtNum(d.streams)}</div>
                                    <div class="bar-label">${dateLabel}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // Top tracks table
        if (data.top_tracks?.length) {
            if (content) content += '<div class="subsection-divider"></div>';
            const maxStreams = Math.max(...data.top_tracks.map(t => t.weekly_streams || 0));
            content += `
                <table class="tracks-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Track</th>
                            <th>Weekly Streams</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.top_tracks.map(t => {
                            const pct = maxStreams > 0 ? ((t.weekly_streams || 0) / maxStreams * 100) : 0;
                            return `
                                <tr>
                                    <td>${t.rank}</td>
                                    <td>${esc(t.title)}</td>
                                    <td class="track-bar-cell">
                                        <div class="track-bar-bg"></div>
                                        <div class="track-bar-fill" style="width: ${pct}%;"></div>
                                        <span class="track-streams">${fmtNum(t.weekly_streams)}</span>
                                    </td>
                                    <td>${fmtNum(t.total_streams)}</td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        if (!content) content = '<p class="section-empty">No streaming data yet</p>';

        return sectionWrap(num, 'Streaming', content, 'streaming');
    }

    // ── 03 Press ────────────────────────────────────────────────────────

    function renderPress(data, num, reportId) {
        let content = '';

        if (data.press?.length) {
            const featured = data.press.filter(p => p.featured).slice(0, 6);
            const listed = data.press.filter(p => !p.featured);

            if (featured.length) {
                content += '<div class="press-grid">';
                content += featured.map(item => {
                    const screenshotHtml = item.screenshot
                        ? `<img src="/weekly-report/api/reports/${reportId}/images/${item.screenshot}" alt="${esc(item.headline)}">`
                        : `<span class="press-card-screenshot-placeholder">Screenshot</span>`;

                    const inner = `
                        <div class="press-card-screenshot">${screenshotHtml}</div>
                        <div class="press-card-body">
                            <div class="press-card-outlet">${esc(item.outlet)}</div>
                            <div class="press-card-headline">${esc(item.headline)}</div>
                            <div class="press-card-date">${fmtDate(item.date)}</div>
                        </div>`;

                    return item.url
                        ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="press-card press-card-link">${inner}</a>`
                        : `<div class="press-card">${inner}</div>`;
                }).join('');
                content += '</div>';
            }

            if (listed.length) {
                content += '<div class="press-list">';
                content += listed.map(item => {
                    const inner = `
                        <div class="press-list-outlet">${esc(item.outlet)}</div>
                        <div class="press-list-headline">${esc(item.headline)}</div>
                        <div class="press-list-date">${fmtDate(item.date)}</div>`;

                    return item.url
                        ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="press-list-row press-list-row-link">${inner}</a>`
                        : `<div class="press-list-row">${inner}</div>`;
                }).join('');
                content += '</div>';
            }
        }

        if (!content) content = '<p class="section-empty">No press yet</p>';

        return sectionWrap(num, 'Press', content, 'press');
    }

    // ── 04 Socials Pages ────────────────────────────────────────────────

    function renderSocialPages(data, num, reportId) {
        let content = '';

        // Combine social_channels + creators into one unified list
        const allItems = [
            ...(data.social_channels || []).map(c => ({ ...c, _name: c.account_name })),
            ...(data.creators || []).map(c => ({ ...c, _name: c.creator_name })),
        ];

        const featured = allItems.filter(i => i.featured);
        const listed = allItems.filter(i => !i.featured);

        // Featured items → visual cards
        if (featured.length) {
            content += '<div class="social-channel-grid">';
            content += featured.map(item => {
                const screenshotHtml = item.screenshot
                    ? `<img src="/weekly-report/api/reports/${reportId}/images/${item.screenshot}" alt="${esc(item._name)}">`
                    : `<span class="press-card-screenshot-placeholder">${platformLabel(item.platform)}</span>`;

                const inner = `
                    <div class="social-channel-card-screenshot">${screenshotHtml}</div>
                    <div class="social-channel-card-body">
                        <div class="social-channel-card-platform">${platformLabel(item.platform)}</div>
                        <div class="social-channel-card-account">${esc(item._name)}</div>
                        ${item.description ? `<div class="social-channel-card-desc">${esc(item.description)}</div>` : ''}
                        ${item.date ? `<div class="social-channel-card-date">${fmtDate(item.date)}</div>` : ''}
                    </div>`;

                return item.url
                    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="social-channel-card social-channel-card-link">${inner}</a>`
                    : `<div class="social-channel-card">${inner}</div>`;
            }).join('');
            content += '</div>';
        }

        // Non-featured items → simple list: "Platform: Name"
        if (listed.length) {
            content += '<div class="social-channel-list">';
            content += listed.map(item => {
                const inner = `
                    <span class="social-channel-list-platform">${platformLabel(item.platform)}</span>
                    <span class="social-channel-list-name">${esc(item._name)}</span>`;

                return item.url
                    ? `<a href="${esc(item.url)}" target="_blank" rel="noopener" class="social-channel-list-row social-channel-list-row-link">${inner}</a>`
                    : `<div class="social-channel-list-row">${inner}</div>`;
            }).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No socials pages yet</p>';

        return sectionWrap(num, 'Socials Pages', content, 'social_pages');
    }

    // ── 05 Socials (follower cards) ─────────────────────────────────

    const SOCIAL_CARDS = {
        instagram_followers:  { label: 'Instagram',  metric: 'Followers', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>' },
        tiktok_followers:     { label: 'TikTok',     metric: 'Followers', icon: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M38.4 16.2c-2.7 0-5.2-1-7.2-2.8-1.8-1.7-3-4-3.3-6.6V4.8h-7v26.4c0 3-2.4 5.4-5.4 5.4s-5.4-2.4-5.4-5.4 2.4-5.4 5.4-5.4c.6 0 1.1.1 1.6.3v-7.2c-.5-.1-1.1-.1-1.6-.1-6.9 0-12.6 5.6-12.6 12.6S9.6 43.8 16.5 43.8c6.9 0 12.6-5.6 12.6-12.6V19.8c2.7 2 6 3.2 9.5 3.2v-7c.1 0-.1.2-.2.2z"/></svg>' },
        youtube_subscribers:  { label: 'YouTube',    metric: 'Subscribers', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>' },
        spotify_followers:    { label: 'Spotify',    metric: 'Followers', icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>' },
    };

    function parseGrowthNum(g) {
        if (!g) return 0;
        const cleaned = g.replace(/[,+\s]/g, '');
        const m = cleaned.match(/^(-?\d*\.?\d+)(K|M)?$/i);
        if (!m) return 0;
        let n = parseFloat(m[1]);
        if (m[2]?.toUpperCase() === 'K') n *= 1000;
        if (m[2]?.toUpperCase() === 'M') n *= 1000000;
        return n;
    }

    // Metric icons for socials image cards
    const METRIC_ICONS = {
        views:    '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>',
        likes:    '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>',
        comments: '<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
    };

    function renderSocials(data, num, reportId) {
        const defaultOrder = ['instagram_followers', 'tiktok_followers', 'youtube_subscribers', 'spotify_followers'];
        const order = (data.socials_card_order && data.socials_card_order.length) ? data.socials_card_order : defaultOrder;

        const growth = data.socials_growth || {};
        const urls = data.socials_urls || {};

        // Total social reach — sum all platform follower values shown on this slide
        const reachVals = order.map(k => data[k]).filter(v => v != null);
        const totalReach = reachVals.length ? reachVals.reduce((a, b) => a + b, 0) : null;

        // Total social growth — parse and sum all growth strings
        const totalGrowth = Object.values(growth).reduce((sum, g) => sum + parseGrowthNum(g), 0);

        const rows = order.map(key => {
            const def = SOCIAL_CARDS[key];
            if (!def) return '';
            const val = data[key];
            if (val == null) return '';
            const g = growth[key];
            const growthHtml = g ? `<span class="socials-breakdown-growth">${esc(g)}</span>` : '';
            return `
                <div class="socials-breakdown-row">
                    <span class="socials-breakdown-icon">${def.icon}</span>
                    <span class="socials-breakdown-label">${def.label}: ${def.metric}</span>
                    ${growthHtml}
                    <span class="socials-breakdown-value">${fmtNum(val)}</span>
                </div>`;
        }).filter(Boolean).join('');

        // Hero numbers (below breakdown, side by side)
        const heroStats = [];
        if (totalReach) {
            heroStats.push({ label: 'Total Social Reach', value: fmtNum(totalReach) });
        }
        if (totalGrowth) {
            heroStats.push({ label: 'Total Social Growth', value: '+' + totalGrowth.toLocaleString() });
        }

        const heroHTML = heroStats.map(h => `
            <div class="socials-hero-stat">
                <div class="socials-hero-label">${h.label}</div>
                <div class="socials-hero-value">${h.value}</div>
            </div>
        `).join('');

        // Social images grid (left column)
        const socialsImages = data.socials_images || [];
        let imagesHTML = '';
        if (socialsImages.length) {
            const cards = socialsImages.map(img => {
                if (!img.image) return '';
                const src = `/weekly-report/api/reports/${reportId}/images/${img.image}`;
                const metrics = [];
                if (img.views)    metrics.push(`<span class="socials-img-metric">${METRIC_ICONS.views}<span>${esc(img.views)}</span></span>`);
                if (img.likes)    metrics.push(`<span class="socials-img-metric">${METRIC_ICONS.likes}<span>${esc(img.likes)}</span></span>`);
                if (img.comments) metrics.push(`<span class="socials-img-metric">${METRIC_ICONS.comments}<span>${esc(img.comments)}</span></span>`);
                const imgTag = img.url
                    ? `<a href="${esc(img.url)}" target="_blank" rel="noopener"><img class="socials-img-thumb" src="${src}" alt=""></a>`
                    : `<img class="socials-img-thumb" src="${src}" alt="">`;
                return `<div class="socials-img-card">
                    ${imgTag}
                    ${metrics.length ? `<div class="socials-img-metrics">${metrics.join('')}</div>` : ''}
                </div>`;
            }).filter(Boolean).join('');
            if (cards) imagesHTML = `<div class="socials-img-grid">${cards}</div>`;
        }

        const breakdownHTML = rows
            ? `<div class="socials-breakdown">${rows}</div>`
            : '<p class="section-empty">No social data yet</p>';

        const content = `
            <div class="socials-layout">
                ${imagesHTML ? `<div class="socials-img-area">${imagesHTML}</div>` : ''}
                ${breakdownHTML}
                ${heroHTML ? `<div class="socials-hero">${heroHTML}</div>` : ''}
            </div>
        `;

        return sectionWrap(num, 'Socials', content, 'socials');
    }

    function socialRow(label, value, delta) {
        const deltaHtml = delta != null
            ? ` <span class="delta ${delta >= 0 ? 'positive' : 'negative'}">${delta >= 0 ? '+' : ''}${fmtNum(delta)}</span>`
            : '';
        return `
            <div class="social-stat-row">
                <span class="social-stat-label">${label}</span>
                <span class="social-stat-value">${value}${deltaHtml}</span>
            </div>
        `;
    }

    // ── 05 Radio ──────────────────────────────────────────────────────

    function renderRadio(data, num) {
        let content = '';

        if (data.radio?.length) {
            content += '<div class="radio-grid">';
            content += data.radio.map(r => `
                <div class="radio-card">
                    <div class="radio-card-station">${esc(r.station)}</div>
                    ${r.show ? `<div class="radio-card-show">${esc(r.show)}</div>` : ''}
                    ${r.date ? `<div class="radio-card-date">${fmtDate(r.date)}</div>` : ''}
                </div>
            `).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No radio data yet</p>';

        return sectionWrap(num, 'Radio', content, 'radio');
    }

    // ── 07 Club ──────────────────────────────────────────────────────

    function renderClub(data, num) {
        let content = '';

        if (data.club?.length) {
            content += '<div class="radio-grid">';
            content += data.club.map(c => `
                <div class="radio-card">
                    <div class="radio-card-station">${esc(c.venue)}</div>
                    ${c.event ? `<div class="radio-card-show">${esc(c.event)}</div>` : ''}
                    ${c.dj ? `<div class="radio-card-date">DJ: ${esc(c.dj)}</div>` : ''}
                    ${c.date ? `<div class="radio-card-date">${fmtDate(c.date)}</div>` : ''}
                </div>
            `).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No club data yet</p>';

        return sectionWrap(num, 'Club', content, 'club');
    }

    // ── 08 Quotes ────────────────────────────────────────────────────

    function renderQuotes(data, num) {
        let content = '';

        if (data.quotes?.length) {
            content += '<div class="quotes-grid">';
            content += data.quotes.map(q => `
                <div class="quote-card">
                    <div class="quote-mark">\u201C</div>
                    <div class="quote-text">${esc(q.text)}</div>
                    <div class="quote-source">${esc(q.source)}</div>
                </div>
            `).join('');
            content += '</div>';
        }

        if (!content) content = '<p class="section-empty">No quotes yet</p>';

        return sectionWrap(num, 'Quotes', content, 'quotes');
    }

    // ── Footer ────────────────────────────────────────────────────────

    function renderFooter(data) {
        return `
            <footer class="report-footer">
                <p class="report-footer-text">Prepared for internal use — Confidential</p>
                <p class="report-footer-text" style="margin-top: 4px; opacity: 0.5;">${esc(data.artist_name)} Weekly Report — ${fmtDate(data.week_commencing)}</p>
            </footer>
        `;
    }

    // ── Helpers ────────────────────────────────────────────────────────

    function sectionWrap(num, title, content, id) {
        const numStr = String(num).padStart(2, '0');
        return `
            <section class="report-section" id="${id || ''}">
                <div class="report-section-header">
                    <span class="report-section-number">${numStr}</span>
                    <span class="report-section-divider">—</span>
                    <span class="report-section-title">${title}</span>
                </div>
                <div class="report-section-content">
                    ${content}
                </div>
            </section>
        `;
    }

    function fmtNum(n) {
        if (n == null) return '—';
        if (Math.abs(n) >= 1_000_000) { const v = (n / 1_000_000).toFixed(1); return (v.endsWith('.0') ? v.slice(0, -2) : v) + 'M'; }
        if (Math.abs(n) >= 1_000) { const v = (n / 1_000).toFixed(1); return (v.endsWith('.0') ? v.slice(0, -2) : v) + 'K'; }
        return n.toLocaleString();
    }

    function fmtDelta(pct) {
        if (pct == null) return '';
        const sign = pct >= 0 ? '+' : '';
        const cls = pct >= 0 ? 'positive' : 'negative';
        return `<span class="delta ${cls}">${sign}${pct.toFixed(1)}%</span>`;
    }

    function fmtDateLong(iso) {
        if (!iso) return '';
        const d = new Date(iso + 'T00:00:00');
        const month = d.toLocaleDateString('en-US', { month: 'long' });
        const day = d.getDate();
        const year = d.getFullYear();
        const suffix = [,'st','nd','rd'][day % 10 > 3 ? 0 : (day % 100 - day % 10 !== 10) * (day % 10)] || 'th';
        return `${month} ${day}${suffix}, ${year}`;
    }

    function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso + 'T00:00:00');
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function esc(s) {
        if (!s) return '';
        return s
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function platformLabel(p) {
        const labels = {
            spotify: 'Spotify',
            apple_music: 'Apple Music',
            amazon_music: 'Amazon Music',
            youtube_music: 'YouTube',
            youtube: 'YouTube',
            deezer: 'Deezer',
            soundcloud: 'SoundCloud',
            instagram: 'Instagram',
            twitter: 'X / Twitter',
            tiktok: 'TikTok',
        };
        return labels[p] || p;
    }

    // ── Start ─────────────────────────────────────────────────────────
    init();

})();

;(function(){
                // Rewrite image srcs to base64 after render
                const d = window.__REPORT_DATA__;
                if (!d) return;
                const rid = d._meta?.report_id || '';
                const base = '/weekly-report/api/reports/' + rid + '/images/';

                // Hero bg
                if (d._hero_image_b64) {
                    const el = document.querySelector('.report-hero-bg');
                    if (el) el.style.backgroundImage = 'url(' + d._hero_image_b64 + ')';
                }

                // All img tags with src starting with base
                document.querySelectorAll('img').forEach(img => {
                    const src = img.getAttribute('src');
                    if (!src || !src.startsWith(base)) return;
                    const filename = src.slice(base.length);

                    // Press & social channel screenshots
                    for (const list of [d.press, d.social_channels, d.creators]) {
                        for (const item of (list || [])) {
                            if (item.screenshot === filename && item._screenshot_b64) {
                                img.src = item._screenshot_b64;
                                return;
                            }
                        }
                    }

                    // Socials images
                    for (const si of (d.socials_images || [])) {
                        if (si.image === filename && si._image_b64) {
                            img.src = si._image_b64;
                            return;
                        }
                    }
                });
            })();
</script>
